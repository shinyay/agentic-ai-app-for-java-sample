server.port=8080
server.servlet.context-path=/api

# Production Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/vibecode_studio
spring.datasource.username=vibecode
spring.datasource.password=vibecode123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AI Configuration for Production (Azure AI Foundry)
vibecode.ai.provider=azure
vibecode.ai.azure.endpoint=${AZURE_AI_ENDPOINT}
vibecode.ai.azure.key=${AZURE_AI_KEY}
vibecode.ai.azure.deployment-name=${AZURE_AI_DEPLOYMENT:gpt-4}
vibecode.ai.azure.temperature=${AZURE_AI_TEMPERATURE:0.7}
vibecode.ai.azure.max-tokens=${AZURE_AI_MAX_TOKENS:2048}

# Security Configuration
vibecode.security.jwt.secret=${JWT_SECRET}
vibecode.security.jwt.expiration=86400000

# Cost Management
vibecode.cost.default-monthly-limit=${MONTHLY_COST_LIMIT:500.0}
vibecode.cost.alert-threshold=${COST_ALERT_THRESHOLD:0.8}

# GuardRail Configuration
vibecode.guardrail.enabled=${GUARDRAIL_ENABLED:true}
vibecode.guardrail.strict-mode=${GUARDRAIL_STRICT_MODE:true}
vibecode.guardrail.allowed-packages=${ALLOWED_PACKAGES:org.springframework,com.fasterxml.jackson,org.hibernate,java.util,java.lang}

# Logging
logging.level.com.vibecode=INFO
logging.level.org.springframework.security=WARN
logging.level.com.azure=WARN