server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/vibecode_studio
spring.datasource.username=vibecode
spring.datasource.password=vibecode123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-demo-key}
spring.ai.openai.chat.options.model=gpt-4
spring.ai.openai.chat.options.temperature=0.7

# Security Configuration
vibecode.security.jwt.secret=${JWT_SECRET:vibecode-studio-secret-key-for-dev}
vibecode.security.jwt.expiration=86400000

# Cost Management
vibecode.cost.default-monthly-limit=100.0
vibecode.cost.alert-threshold=0.8

# GuardRail Configuration
vibecode.guardrail.enabled=true
vibecode.guardrail.strict-mode=false
vibecode.guardrail.allowed-packages=org.springframework,com.fasterxml.jackson,org.hibernate

# Logging
logging.level.com.vibecode=DEBUG
logging.level.org.springframework.security=DEBUG