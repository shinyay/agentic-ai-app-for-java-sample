server.port=8080
server.servlet.context-path=/api

# Development Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:vibecode_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# AI Configuration for Development (Mock)
vibecode.ai.provider=mock

# Security Configuration
vibecode.security.jwt.secret=${JWT_SECRET:vibecode-studio-secret-key-for-dev}
vibecode.security.jwt.expiration=86400000

# Cost Management
vibecode.cost.default-monthly-limit=100.0
vibecode.cost.alert-threshold=0.8

# GuardRail Configuration
vibecode.guardrail.enabled=true
vibecode.guardrail.strict-mode=false
vibecode.guardrail.allowed-packages=org.springframework,com.fasterxml.jackson,org.hibernate

# Logging
logging.level.com.vibecode=INFO
logging.level.org.springframework.security=INFO